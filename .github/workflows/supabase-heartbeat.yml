name: Supabase Redundant Pulse

on:
  schedule:
    # Runs at 00:00 every 4 days (staggered with your cPanel 5-day cron)
    - cron: '0 0 */4 * *'
  workflow_dispatch: # Allows you to trigger it manually from GitHub UI

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Insert Heartbeat Row
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeat" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{"status": "github-action-pulse"}'